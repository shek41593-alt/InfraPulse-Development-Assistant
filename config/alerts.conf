# ==========================================================
# InfraPulse Alert Configuration
# ==========================================================

# -------------------------
# Alert Thresholds (%)
# -------------------------

CPU_THRESHOLD=80
MEMORY_THRESHOLD=80
DISK_THRESHOLD=85

# -------------------------
# Notification Channels
# -------------------------

SLACK_ENABLED=true
DISCORD_ENABLED=true
TELEGRAM_ENABLED=true
EMAIL_ENABLED=false

# -------------------------
# Future Settings
# -------------------------

# Enable service monitoring
SERVICE_ALERTS=true

# Enable network monitoring
NETWORK_ALERTS=true

# Enable report generation after alerts
GENERATE_REPORT=true

# Cooldown period (seconds)
ALERT_COOLDOWN=300
