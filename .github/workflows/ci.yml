name: InfraPulse CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            shellcheck \
            jq \
            bc \
            curl \
            iproute2 \
            net-tools \
            procps

      - name: Verify Project Structure
        run: |
          test -d monitoring
          test -d dashboard
          test -d notifications
          test -d automation
          test -d multiserver
          test -d docker

      - name: Make Scripts Executable
        run: |
          find . -type f -name "*.sh" -exec chmod +x {} \;

      - name: Run ShellCheck
        run: |
          while IFS= read -r file; do
            echo "Checking ${file}"
            shellcheck --severity=error -x "$file"
          done < <(find . -type f -name "*.sh")

      - name: Build Docker Image
        run: |
          docker build \
            -f docker/Dockerfile \
            -t infrapulse:latest .

      - name: Verify Docker Image
        run: |
          docker images | grep infrapulse
